<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loteria - JackLotus</title>
    <!-- Google Fonts: Inter and JetBrains Mono -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            /* Surface Colors - Based on ZN Design System but optimized for Lottery */
            --surface-page: #05070d;
            --surface-card: #0a0e1a;
            --surface-elevated: #0f1424;
            --surface-hover: #141929;
            --surface-hud: rgba(5, 7, 13, 0.95);
            
            /* Text Colors */
            --text-primary: #ffffff;
            --text-secondary: #d1d5db;
            --text-muted: #6b7280;
            
            /* Primary Accent - Orange (User Request) */
            --accent-primary: #f59e0b;
            --accent-hover: #d97706;
            --accent-light: #fbbf24;
            --accent-subtle: rgba(245, 158, 11, 0.12);
            
            /* Status */
            --status-error: #ef4444;
            --status-warning: #f59e0b;
            
            /* Borders & Radius */
            --border-default: rgba(255, 255, 255, 0.07);
            --border-subtle: rgba(255, 255, 255, 0.04);
            --border-accent: rgba(245, 158, 11, 0.4);
            
            --radius-card: 16px;
            --radius-button: 10px;
            --radius-input: 10px;
            --radius-badge: 6px;
            
            /* Typography */
            --font-interface: 'Inter', sans-serif;
            --font-data: 'JetBrains Mono', monospace;
            
            /* Transitions */
            --transition-base: 250ms ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: var(--font-interface);
            background: transparent;
            overflow: hidden;
            color: var(--text-primary);
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(2px);
            justify-content: center;
            align-items: center;
            z-index: 9999;
            opacity: 0;
            transition: opacity var(--transition-base);
        }

        .container.active {
            display: flex;
            opacity: 1;
        }

        /* Card Structure */
        .lottery-card {
            background: var(--surface-card);
            width: 480px;
            border-radius: var(--radius-card);
            border: 1px solid var(--border-default);
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.8);
            position: relative;
            overflow: hidden;
            transform: translateY(20px);
            transition: transform var(--transition-base);
        }

        .container.active .lottery-card {
            transform: translateY(0);
        }

        /* Visual Richness - Pattern Overlay */
        .lottery-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(circle at 2px 2px, rgba(255,255,255,0.03) 1px, transparent 0);
            background-size: 24px 24px;
            pointer-events: none;
        }

        /* Header Section */
        .header {
            padding: 30px 40px;
            position: relative;
            border-bottom: 1px solid var(--border-subtle);
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .icon-box {
            width: 56px;
            height: 56px;
            background: var(--accent-subtle);
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--accent-primary);
            font-size: 24px;
            border: 1px solid var(--border-accent);
        }

        .header-text h1 {
            font-size: 20px;
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--text-primary);
        }

        .header-text p {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        /* Prize Section */
        .prize-hero {
            padding: 30px 40px;
            text-align: center;
            background: linear-gradient(180deg, rgba(245, 158, 11, 0.05) 0%, transparent 100%);
        }

        .label-muted {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            font-weight: 600;
            margin-bottom: 8px;
            display: block;
        }

        .prize-value {
            font-family: var(--font-data);
            font-size: 42px;
            font-weight: 800;
            color: var(--accent-primary);
            text-shadow: 0 0 30px rgba(245, 158, 11, 0.2);
        }

        /* Info Grid */
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1px;
            background: var(--border-subtle);
            border-top: 1px solid var(--border-subtle);
            border-bottom: 1px solid var(--border-subtle);
        }

        .info-item {
            padding: 20px 40px;
            background: var(--surface-card);
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .info-value {
            font-family: var(--font-data);
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
        }

        /* Input Section */
        .input-section {
            padding: 30px 40px;
        }

        .input-wrapper {
            position: relative;
            margin-top: 10px;
        }

        .lottery-input {
            width: 100%;
            background: var(--surface-elevated);
            border: 1px solid var(--border-default);
            border-radius: var(--radius-input);
            padding: 16px 20px;
            font-family: var(--font-data);
            font-size: 24px;
            color: var(--text-primary);
            text-align: center;
            transition: all var(--transition-base);
        }

        .lottery-input:focus {
            outline: none;
            border-color: var(--accent-primary);
            background: var(--surface-hover);
            box-shadow: 0 0 20px rgba(245, 158, 11, 0.1);
        }

        .lottery-input::placeholder {
            color: rgba(255, 255, 255, 0.1);
        }

        /* Chrome, Safari, Edge, Opera - Remove arrows */
        .lottery-input::-webkit-outer-spin-button,
        .lottery-input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        /* Firefox - Remove arrows */
        .lottery-input[type=number] {
            -moz-appearance: textfield;
        }

        .hint {
            font-size: 12px;
            color: var(--text-muted);
            text-align: center;
            margin-top: 12px;
        }

        /* Warning Banner */
        .warning-banner {
            margin: 0 40px 30px;
            padding: 14px 18px;
            background: rgba(239, 68, 68, 0.05);
            border: 1px solid rgba(239, 68, 68, 0.15);
            border-radius: 10px;
            display: flex;
            gap: 14px;
            align-items: center;
        }

        .warning-banner i {
            color: var(--status-error);
            font-size: 16px;
        }

        .warning-banner p {
            font-size: 12px;
            color: #fca5a5;
            font-weight: 500;
            line-height: 1.4;
        }

        /* Footer / Actions */
        .footer {
            padding: 0 40px 40px;
            display: flex;
            gap: 12px;
        }

        .btn {
            flex: 1;
            padding: 14px;
            border-radius: var(--radius-button);
            border: none;
            font-family: var(--font-interface);
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            transition: all var(--transition-base);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-cancel {
            background: var(--surface-elevated);
            color: var(--text-secondary);
            border: 1px solid var(--border-default);
        }

        .btn-cancel:hover {
            background: var(--surface-hover);
            color: var(--text-primary);
            border-color: var(--text-muted);
        }

        .btn-primary {
            background: var(--accent-primary);
            color: #000; /* High contrast black on orange */
            box-shadow: 0 4px 15px rgba(245, 158, 11, 0.3);
        }

        .btn-primary:hover {
            background: var(--accent-light);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(245, 158, 11, 0.4);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        /* Animations */
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background: var(--accent-primary);
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
            box-shadow: 0 0 10px var(--accent-primary);
            animation: pulse 2s infinite;
        }
    </style>
</head>
<body>
    <div class="container" id="lotteryUI">
        <div class="lottery-card">
            <!-- Header -->
            <div class="header">
                <div class="icon-box">
                    <i class="fa-solid fa-ticket"></i>
                </div>
                <div class="header-text">
                    <h1>Sorteio de Loteria</h1>
                    <p>Tente a sorte e ganhe a bolada!</p>
                </div>
            </div>

            <!-- Prize Area -->
            <div class="prize-hero">
                <span class="label-muted">Prêmio Acumulado</span>
                <div class="prize-value" id="prizeAmount">R$ 0</div>
            </div>

            <!-- Info Grid -->
            <div class="info-grid">
                <div class="info-item">
                    <span class="label-muted">Faixa de Números</span>
                    <div class="info-value" id="numberRange">1 - 100</div>
                </div>
                <div class="info-item">
                    <span class="label-muted">Custo da Entrada</span>
                    <div class="info-value" id="entryPrice">R$ 0</div>
                </div>
            </div>

            <!-- Input Area -->
            <div class="input-section">
                <span class="label-muted">Escolha seu número</span>
                <div class="input-wrapper">
                    <input 
                        type="number" 
                        class="lottery-input" 
                        id="numberInput" 
                        placeholder="--"
                        min="1"
                        max="100"
                    >
                </div>
                <p class="hint" id="hintText">Escolha um número entre 1 e 100</p>
            </div>

            <!-- Warning -->
            <div class="warning-banner">
                <i class="fa-solid fa-circle-info"></i>
                <p>Se não houver ganhador, o valor acumula para o próximo sorteio automaticamente.</p>
            </div>

            <!-- Actions -->
            <div class="footer">
                <button class="btn btn-cancel" id="cancelBtn">
                    <i class="fa-solid fa-xmark"></i> Fechar
                </button>
                <button class="btn btn-primary" id="enterBtn">
                    <i class="fa-solid fa-dice"></i> Apostar
                </button>
            </div>
        </div>
    </div>

    <script>
        const ui = document.getElementById('lotteryUI');
        const numberInput = document.getElementById('numberInput');
        const enterBtn = document.getElementById('enterBtn');
        const cancelBtn = document.getElementById('cancelBtn');
        const prizeAmount = document.getElementById('prizeAmount');
        const numberRange = document.getElementById('numberRange');
        const entryPrice = document.getElementById('entryPrice');
        const hintText = document.getElementById('hintText');

        let lotteryData = {
            prize: 0,
            minNumber: 1,
            maxNumber: 100,
            entryPrice: 0
        };

        function formatMoney(value) {
            return 'R$ ' + value.toLocaleString('pt-BR');
        }

        function updateUI() {
            prizeAmount.textContent = formatMoney(lotteryData.prize);
            numberRange.textContent = `${lotteryData.minNumber} - ${lotteryData.maxNumber}`;
            entryPrice.textContent = formatMoney(lotteryData.entryPrice);
            hintText.textContent = `Escolha um número entre ${lotteryData.minNumber} e ${lotteryData.maxNumber}`;
            numberInput.min = lotteryData.minNumber;
            numberInput.max = lotteryData.maxNumber;
        }

        window.addEventListener('message', function(event) {
            const data = event.data;
            
            if (data.action === 'open') {
                ui.classList.add('active');
                numberInput.value = '';
                // Delay focus slightly for animation
                setTimeout(() => numberInput.focus(), 300);
            } else if (data.action === 'close') {
                ui.classList.remove('active');
            } else if (data.action === 'updateInfo') {
                lotteryData = data.data;
                updateUI();
            } else if (data.action === 'updatePrize') {
                lotteryData.prize = data.prize;
                prizeAmount.textContent = formatMoney(data.prize);
            }
        });

        cancelBtn.addEventListener('click', function() {
            fetch(`https://${GetParentResourceName()}/close`, {
                method: 'POST',
                body: JSON.stringify({})
            });
        });

        enterBtn.addEventListener('click', function() {
            const number = parseInt(numberInput.value);
            
            if (!number || number < lotteryData.minNumber || number > lotteryData.maxNumber) {
                // Visual error feedback
                numberInput.style.borderColor = 'var(--status-error)';
                numberInput.style.color = 'var(--status-error)';
                setTimeout(() => {
                    numberInput.style.borderColor = 'var(--border-default)';
                    numberInput.style.color = 'var(--text-primary)';
                }, 1000);
                return;
            }
            
            fetch(`https://${GetParentResourceName()}/enterLottery`, {
                method: 'POST',
                body: JSON.stringify({ number: number })
            });
        });

        numberInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                enterBtn.click();
            }
        });

        document.addEventListener('keyup', function(e) {
            if (e.key === 'Escape' && ui.classList.contains('active')) {
                cancelBtn.click();
            }
        });
    </script>
</body>
</html>
